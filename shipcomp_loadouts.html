<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ship Loadouts — Configure Loadout</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;700&family=Exo+2:wght@400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shipcomp-styles.css">
  <script>console.log('Loading shipcomp-utils.js...');</script>
  <script src="shipcomp-utils.js"></script>
  <script>console.log('ShipCompStorage available:', typeof ShipCompStorage !== 'undefined');</script>
  <script src="shipcomp-custom-components.js"></script>
  <script>console.log('Custom components loaded:', typeof CUSTOM_COMPONENTS !== 'undefined');</script>

  <style>
    .loadouts-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--sl-spacing-xl);
    }

    .back-button {
      padding: var(--sl-spacing-sm) var(--sl-spacing-md);
      font-size: 12px;
    }

    .hardpoint-header {
      display: grid;
      grid-template-columns: 2fr 1.5fr 2fr 2fr;
      gap: var(--sl-spacing-lg);
      margin-bottom: var(--sl-spacing-lg);
      padding-bottom: var(--sl-spacing-lg);
      border-bottom: 2px solid var(--sl-accent-primary);
      font-family: var(--sl-font-data);
      font-size: 11px;
      font-weight: bold;
      color: var(--sl-text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      align-items: center;
    }

    .hardpoint-row {
      display: grid;
      grid-template-columns: 2fr 1.5fr 2fr 2fr;
      gap: var(--sl-spacing-lg);
      margin-bottom: var(--sl-spacing-lg);
      padding-bottom: var(--sl-spacing-lg);
      border-bottom: 1px solid var(--sl-border-secondary);
      align-items: center;
    }

    .hardpoint-row:last-child {
      border-bottom: none;
    }

    .hp-col-component {
      font-family: var(--sl-font-body);
      font-size: 13px;
      font-weight: 500;
      color: var(--sl-text-primary);
    }

    .hp-col-stock {
      font-family: var(--sl-font-body);
      font-size: 12px;
      color: var(--sl-text-secondary);
    }

    .hp-col-current,
    .hp-col-target {
      display: flex;
      align-items: center;
    }

    .hp-dropdown {
      width: 100%;
      padding: var(--sl-spacing-sm) var(--sl-spacing-md);
      background: var(--sl-bg-card);
      border: 1px solid var(--sl-border-secondary);
      color: var(--sl-text-primary);
      font-family: var(--sl-font-body);
      font-size: 12px;
      border-radius: var(--sl-border-radius);
      box-sizing: border-box;
    }

    .hp-dropdown:focus {
      outline: none;
      border-color: var(--sl-accent-primary);
      box-shadow: 0 0 0 2px rgba(240, 160, 64, 0.1);
    }

    .header-reset-btn {
      padding: var(--sl-spacing-sm) var(--sl-spacing-md);
      font-size: 11px;
      margin-left: var(--sl-spacing-md);
      display: inline-block;
    }

    .cards-container {
      display: none;
    }

    .card {
      background: var(--sl-bg-card);
      border: 1px solid var(--sl-border-secondary);
      border-radius: var(--sl-border-radius-lg);
      overflow: hidden;
    }

    .card-header {
      background: var(--sl-bg-panel);
      padding: var(--sl-spacing-md) var(--sl-spacing-lg);
      border-bottom: 1px solid var(--sl-border-secondary);
      font-family: var(--sl-font-data);
      font-size: 11px;
      color: var(--sl-text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: bold;
    }

    .card-body {
      padding: var(--sl-spacing-lg);
      min-height: 80px;
      display: flex;
      flex-direction: column;
    }

    .card-value {
      font-family: var(--sl-font-body);
      font-size: 13px;
      color: var(--sl-text-secondary);
      word-break: break-word;
      flex: 1;
    }

    .card-value.satisfied {
      color: var(--sl-accent-primary);
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-dropdown {
      width: 100%;
      padding: var(--sl-spacing-sm) var(--sl-spacing-md);
      background: var(--sl-bg-card);
      border: 1px solid var(--sl-border-secondary);
      color: var(--sl-text-primary);
      font-family: var(--sl-font-body);
      font-size: 12px;
      border-radius: var(--sl-border-radius);
      box-sizing: border-box;
      margin-top: var(--sl-spacing-md);
    }

    .card-dropdown:focus {
      outline: none;
      border-color: var(--sl-accent-primary);
      box-shadow: 0 0 0 2px rgba(240, 160, 64, 0.1);
    }

    .stock-card .card-body {
      pointer-events: none;
      opacity: 0.7;
    }

    .empty-state {
      text-align: center;
      padding: var(--sl-spacing-xl);
      color: var(--sl-text-secondary);
    }

    .tabs-container {
      display: flex;
      gap: var(--sl-spacing-md);
      margin-bottom: var(--sl-spacing-xl);
      border-bottom: 1px solid var(--sl-border-secondary);
    }

    .tab-button {
      padding: var(--sl-spacing-md) var(--sl-spacing-lg);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      font-family: var(--sl-font-data);
      font-size: 13px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--sl-text-dim);
      cursor: pointer;
      transition: all var(--sl-transition-fast);
    }

    .tab-button:hover {
      color: var(--sl-accent-primary);
    }

    .tab-button.active {
      color: var(--sl-accent-primary);
      border-bottom-color: var(--sl-accent-primary);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="loadouts-header">
      <div>
        <div class="module-header">
          <p class="module-eyebrow">Ship Configuration</p>
          <h1 class="module-title" id="shipTitle">Loading...</h1>
        </div>
      </div>
      <button class="btn-accent back-button" onclick="goBackToHangar()">← Back to Hangar</button>
    </div>

    <div class="tabs-container">
      <button class="tab-button active" onclick="switchTab('system')">System</button>
      <button class="tab-button" onclick="switchTab('weapons')">Weapons</button>
    </div>

    <div id="systemTab" class="tab-content active">
      <div id="hardpointsContainer">
        <div class="empty-state">
          <p class="text-secondary">Loading hardpoints...</p>
        </div>
      </div>
    </div>

    <div id="weaponsTab" class="tab-content">
      <div id="weaponHardpointsContainer">
        <div class="empty-state">
          <p class="text-secondary">Loading weapon hardpoints...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentShipId = null;
    let currentShip = null;

    // Initialize on page load
    window.addEventListener('DOMContentLoaded', () => {
      // Read shipId from localStorage (set by hangar via postMessage)
      const shipIdStr = localStorage.getItem('shipcomp-loadouts-shipId');
      currentShipId = shipIdStr ? parseInt(shipIdStr) : null;

      if (!currentShipId) {
        document.getElementById('hardpointsContainer').innerHTML = `
          <div class="empty-state">
            <p class="text-secondary">No ship specified.</p>
            <p class="text-dim" style="font-size: 12px;">Return to Hangar and click a ship's LOADOUT button.</p>
          </div>
        `;
        return;
      }

      // Restore active tab preference
      const activeTab = localStorage.getItem('shipcomp-loadouts-activeTab') || 'system';
      switchTab(activeTab);

      // Wait for ShipCompStorage to be available
      if (typeof ShipCompStorage === 'undefined') {
        setTimeout(() => {
          loadShipLoadout();
          if (activeTab === 'weapons') loadWeaponLoadout();
        }, 100);
      } else {
        loadShipLoadout();
        if (activeTab === 'weapons') loadWeaponLoadout();
      }
      window.addEventListener('shipcomp-data-change', (e) => {
        if (e.detail.key === 'loadouts' || e.detail.key === 'crafted-items') {
          loadShipLoadout();
          loadWeaponLoadout();
        }
      });
    });

    // Load ship and display hardpoints
    function loadShipLoadout() {
      const ships = ShipCompStorage.getShips();
      const loadouts = ShipCompStorage.getLoadouts();
      const allComponents = ShipCompStorage.getComponents();
      const craftedItems = ShipCompStorage.getCraftedItems();

      currentShip = ships.find(s => s.id === currentShipId);
      if (!currentShip) {
        document.getElementById('hardpointsContainer').innerHTML = `
          <div class="empty-state">
            <p class="text-secondary">Ship not found.</p>
          </div>
        `;
        return;
      }

      document.getElementById('shipTitle').textContent = currentShip.name;

      const stockLoadout = currentShip.stock_loadout || {};
      console.log('Ship data:', currentShip);
      console.log('Stock loadout:', stockLoadout);

      if (Object.keys(stockLoadout).length === 0) {
        document.getElementById('hardpointsContainer').innerHTML = `
          <div class="empty-state">
            <p class="text-secondary">No hardpoints found for this ship.</p>
            <p class="text-dim" style="font-size: 12px;">Run Data Sync to load ship component data from Star Citizen Wiki.</p>
          </div>
        `;
        return;
      }

      let shipLoadout = loadouts[currentShipId] || {};

      // Initialize CURRENT with STOCK values if not already set
      let loadoutChanged = false;
      for (const hardpointName in stockLoadout) {
        const stockComp = stockLoadout[hardpointName];

        if (!shipLoadout[hardpointName]) {
          shipLoadout[hardpointName] = { stock: null, current: null, target: null };
        }
        if (!shipLoadout[hardpointName].current) {
          shipLoadout[hardpointName].current = `component:${stockComp.component_uuid}`;
          loadoutChanged = true;
        }
      }

      // Save if we initialized any values
      if (loadoutChanged) {
        loadouts[currentShipId] = shipLoadout;
        localStorage.setItem('shipcomp-loadouts', JSON.stringify(loadouts));
      }

      // Format hardpoint name (e.g., hardpoint_cooler → Cooler)
      function formatHardpointName(name, size) {
        return name
          .replace('hardpoint_', '')
          .replace(/_/g, ' ')
          .split(' ')
          .map(w => w.charAt(0).toUpperCase() + w.slice(1))
          .join(' ')
          .toUpperCase() + ' SIZE ' + size;
      }

      // Build header row
      const headerHtml = `
        <div class="hardpoint-header">
          <div class="hp-col-component">COMPONENT</div>
          <div class="hp-col-stock">STOCK</div>
          <div class="hp-col-current">
            CURRENT
            <button class="btn-accent header-reset-btn" onclick="resetAllToStock()">RESET TO STOCK</button>
          </div>
          <div class="hp-col-target">TARGET</div>
        </div>
      `;

      // Define component type sort order (groups similar components together)
      function getComponentTypePriority(type) {
        const priority = {
          'PowerPlant': 0,
          'QuantumDrive': 1,
          'Shield': 2,
          'Cooler': 3,
          'Radar': 4
        };
        return priority[type] !== undefined ? priority[type] : 99;
      }

      // Build hardpoint rows - sort by component type to group similar items
      const hardpointEntries = Object.entries(stockLoadout).sort(([nameA, compA], [nameB, compB]) => {
        const priorityA = getComponentTypePriority(compA.type);
        const priorityB = getComponentTypePriority(compB.type);
        if (priorityA !== priorityB) {
          return priorityA - priorityB;
        }
        // If same type, sort by size then by name
        if (compA.size !== compB.size) {
          return compA.size - compB.size;
        }
        return nameA.localeCompare(nameB);
      });

      const hardpointsHtml = hardpointEntries.map(([hardpointName, stockComp]) => {
        const type = stockComp.type;
        const size = stockComp.size;
        const slotData = shipLoadout[hardpointName] || { stock: null, current: null, target: null };

        // Get matching components and crafted items
        const matchingComponents = allComponents.filter(c =>
          c.type === type && c.size === size
        ).sort((a, b) => a.name.localeCompare(b.name));

        // Log component availability
        const allTypeComponents = allComponents.filter(c => c.type === type);
        console.log(`Component type "${type}": ${allTypeComponents.length} total, ${matchingComponents.length} for size ${size}`);

        const matchingCrafted = craftedItems.filter(c =>
          c.type === type && c.size === size
        ).sort((a, b) => a.name.localeCompare(b.name));

        // Merge and sort components for both CURRENT and TARGET dropdowns
        const mergedComponents = mergeComponentData(type, size, matchingComponents);
        const sortedComponents = sortComponentsByPriority([...mergedComponents]);

        // Current dropdown: stock, crafted items, then merged/sorted components
        const stockValue = `component:${stockComp.component_uuid}`;
        const currentOptions = buildCurrentOptions(matchingCrafted, sortedComponents, stockComp, slotData.current || stockValue);

        // Target dropdown: merged/sorted components only
        const targetOptions = buildTargetOptions(sortedComponents, slotData.target, hardpointName);

        // Check if satisfied (current matches target, ignoring [CRAFTED] tag)
        const isSatisfied = checkSatisfied(slotData.current || stockValue, slotData.target);

        // Get stock component display name
        const stockDisplay = `${stockComp.component_name}${stockComp.class ? ' (' + stockComp.class + ' ' + stockComp.grade + ')' : ' (' + stockComp.grade + ')'}`;

        return `
          <div class="hardpoint-row">
            <div class="hp-col-component">${formatHardpointName(hardpointName, size)}</div>
            <div class="hp-col-stock">${stockDisplay}</div>
            <div class="hp-col-current">
              <select class="hp-dropdown" onchange="saveLoadoutSlot('${hardpointName}', 'current', this.value)">
                ${currentOptions}
              </select>
            </div>
            <div class="hp-col-target">
              <select class="hp-dropdown" onchange="saveLoadoutSlot('${hardpointName}', 'target', this.value)">
                ${targetOptions}
              </select>
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('hardpointsContainer').innerHTML = headerHtml + hardpointsHtml;
    }

    // Build current dropdown options (stock, crafted items, then merged/sorted components)
    // NOTE: When Crafted system is implemented, crafted items will be merged into sortedComponents
    // at that point with a [CRAFTED] tag. For now, they're shown separately at the top after stock.
    function buildCurrentOptions(crafted, components, stockComponent, currentValue) {
      let options = '<option value="">— Select —</option>';

      // Stock component first (always available)
      if (stockComponent) {
        const stockValue = `component:${stockComponent.component_uuid}`;
        const stockLabel = `${stockComponent.component_name} [STOCK]`;
        const selected = currentValue === stockValue ? 'selected' : '';
        options += `<option value="${stockValue}" ${selected}>${stockLabel}</option>`;
      }

      // Crafted items (separate section; will be integrated into components list when crafted system is live)
      crafted.forEach(c => {
        const label = `${c.name} [CRAFTED]`;
        const selected = currentValue === `crafted:${c.id}` ? 'selected' : '';
        options += `<option value="crafted:${c.id}" ${selected}>${label}</option>`;
      });

      // Merged/sorted components (same list as TARGET, in priority order: Military→Stealth→Industrial→Competition→Civilian)
      components.forEach(c => {
        const label = `${c.name} (${c.class} ${c.grade})`;
        const selected = currentValue === `component:${c.uuid}` ? 'selected' : '';
        options += `<option value="component:${c.uuid}" ${selected}>${label}</option>`;
      });

      return options;
    }

    // Build target dropdown options (only components - expects pre-sorted input)
    function buildTargetOptions(components, targetValue, hardpointName) {
      let options = '<option value="">— Select —</option>';

      // Components are pre-sorted by priority in loadShipLoadout()
      // Log available options for this hardpoint
      if (components.length > 0) {
        console.log(`TARGET options for ${hardpointName}:`, components.map(c => `${c.name} (${c.class} ${c.grade})`));
      }

      components.forEach(c => {
        const label = `${c.name} (${c.class} ${c.grade})`;
        const selected = targetValue === `component:${c.uuid}` ? 'selected' : '';
        options += `<option value="component:${c.uuid}" ${selected}>${label}</option>`;
      });

      return options;
    }

    // Get component display name from value
    function getComponentDisplay(value, crafted, components) {
      if (!value) return '—';

      if (value.startsWith('crafted:')) {
        const craftedId = parseInt(value.split(':')[1]);
        const item = crafted.find(c => c.id === craftedId);
        return item ? `${item.name} [CRAFTED]` : '—';
      } else if (value.startsWith('component:')) {
        const uuid = value.split(':')[1];
        const comp = components.find(c => c.uuid === uuid);
        return comp ? `${comp.name} (${comp.class} ${comp.grade})` : '—';
      }

      return '—';
    }

    // Check if current satisfies target (ignoring [CRAFTED] tag)
    function checkSatisfied(current, target) {
      if (!current || !target) return false;

      // Extract names without [CRAFTED] tag
      const getCurrentName = () => {
        if (current.startsWith('crafted:')) {
          const allCrafted = ShipCompStorage.getCraftedItems();
          const id = parseInt(current.split(':')[1]);
          const item = allCrafted.find(c => c.id === id);
          return item ? item.name : null;
        } else if (current.startsWith('component:')) {
          const allComps = ShipCompStorage.getComponents();
          const uuid = current.split(':')[1];
          const comp = allComps.find(c => c.uuid === uuid);
          return comp ? comp.name : null;
        }
        return null;
      };

      const getTargetName = () => {
        if (target.startsWith('component:')) {
          const allComps = ShipCompStorage.getComponents();
          const uuid = target.split(':')[1];
          const comp = allComps.find(c => c.uuid === uuid);
          return comp ? comp.name : null;
        }
        return null;
      };

      const currentName = getCurrentName();
      const targetName = getTargetName();

      return currentName && targetName && currentName === targetName;
    }

    // Save loadout slot
    function saveLoadoutSlot(hardpointName, type, value) {
      const loadouts = ShipCompStorage.getLoadouts();
      if (!loadouts[currentShipId]) {
        loadouts[currentShipId] = {};
      }
      if (!loadouts[currentShipId][hardpointName]) {
        loadouts[currentShipId][hardpointName] = { stock: null, current: null, target: null };
      }
      loadouts[currentShipId][hardpointName][type] = value || null;
      localStorage.setItem('shipcomp-loadouts', JSON.stringify(loadouts));
      ShipCompStorage.dispatchChange('loadouts');
    }

    // Reset all CURRENT values to STOCK for all hardpoints
    function resetAllToStock() {
      const ships = ShipCompStorage.getShips();
      const ship = ships.find(s => s.id === currentShipId);
      if (!ship) return;

      const stockLoadout = ship.stock_loadout || {};
      const loadouts = ShipCompStorage.getLoadouts();

      if (!loadouts[currentShipId]) {
        loadouts[currentShipId] = {};
      }

      // Reset all hardpoints to stock
      for (const hardpointName in stockLoadout) {
        const stockComp = stockLoadout[hardpointName];
        const stockValue = `component:${stockComp.component_uuid}`;

        if (!loadouts[currentShipId][hardpointName]) {
          loadouts[currentShipId][hardpointName] = { stock: null, current: null, target: null };
        }
        loadouts[currentShipId][hardpointName].current = stockValue;
      }

      localStorage.setItem('shipcomp-loadouts', JSON.stringify(loadouts));
      ShipCompStorage.dispatchChange('loadouts');
    }

    // Load and display weapon hardpoints
    function loadWeaponLoadout() {
      const ships = ShipCompStorage.getShips();
      const loadouts = ShipCompStorage.getLoadouts();
      const allComponents = ShipCompStorage.getComponents();

      currentShip = ships.find(s => s.id === currentShipId);
      if (!currentShip) {
        document.getElementById('weaponHardpointsContainer').innerHTML = `
          <div class="empty-state">
            <p class="text-secondary">Ship not found.</p>
          </div>
        `;
        return;
      }

      const stockWeapons = currentShip.stock_weapons_loadout || {};
      console.log('Stock weapons:', stockWeapons);

      if (Object.keys(stockWeapons).length === 0) {
        document.getElementById('weaponHardpointsContainer').innerHTML = `
          <div class="empty-state">
            <p class="text-secondary">No weapon hardpoints found for this ship.</p>
          </div>
        `;
        return;
      }

      let shipLoadout = loadouts[currentShipId] || {};

      // Initialize CURRENT with STOCK values if not already set
      let loadoutChanged = false;
      for (const hardpointName in stockWeapons) {
        const stockWpn = stockWeapons[hardpointName];

        if (!shipLoadout[hardpointName]) {
          shipLoadout[hardpointName] = { stock: null, current: null, target: null };
        }
        if (!shipLoadout[hardpointName].current && stockWpn.stock_weapon) {
          shipLoadout[hardpointName].current = `component:${stockWpn.stock_weapon.uuid}`;
          loadoutChanged = true;
        }
      }

      if (loadoutChanged) {
        loadouts[currentShipId] = shipLoadout;
        localStorage.setItem('shipcomp-loadouts', JSON.stringify(loadouts));
      }

      // Group weapons by type: Gun Turrets → Missile Racks → Missile Turrets
      const weaponGroups = {
        'Gun Turrets': [],
        'Missile Racks': [],
        'Missile Turrets': []
      };

      for (const [hardpointName, wpnData] of Object.entries(stockWeapons)) {
        let group = null;

        if (wpnData.mount_type === 'Turret') {
          // Distinguish gun turrets from missile turrets
          group = wpnData.turret_weapon_type === 'WeaponGun' ? 'Gun Turrets' : 'Missile Turrets';
        } else if (wpnData.mount_type === 'MissileLauncher') {
          group = 'Missile Racks';
        }

        // Skip countermeasures
        if (group) {
          weaponGroups[group].push({ hardpointName, ...wpnData });
        }
      }

      // Sort within each group
      for (const group in weaponGroups) {
        weaponGroups[group].sort((a, b) => a.hardpointName.localeCompare(b.hardpointName));
      }

      // Format weapon mount name
      function formatWeaponMountName(name, subType) {
        const baseFormat = name
          .replace('hardpoint_', '')
          .replace('hardpoint_weapon_', '')
          .replace(/^(sidecannon|weapon)_/, '')
          .replace(/_/g, ' ')
          .split(' ')
          .map(w => w.charAt(0).toUpperCase() + w.slice(1))
          .join(' ');

        if (subType) {
          return `${baseFormat} (${subType})`.toUpperCase();
        }
        return baseFormat.toUpperCase();
      }

      // Build header row
      const headerHtml = `
        <div class="hardpoint-header">
          <div class="hp-col-component">WEAPON MOUNT</div>
          <div class="hp-col-stock">STOCK WEAPON</div>
          <div class="hp-col-current">CURRENT</div>
          <div class="hp-col-target">TARGET</div>
        </div>
      `;

      let html = headerHtml;

      for (const [groupName, weapons] of Object.entries(weaponGroups)) {
        if (weapons.length === 0) continue;

        // Group header
        html += `<div style="margin-top: 2rem; margin-bottom: 1rem;">
          <h3 style="font-family: var(--sl-font-data); font-size: 12px; color: var(--sl-text-dim); text-transform: uppercase; margin: 0;">${groupName}</h3>
          <div style="border-bottom: 1px solid var(--sl-border-secondary); margin-top: 0.5rem;"></div>
        </div>`;

        // Weapon rows
        weapons.forEach(wpn => {
          const slotData = shipLoadout[wpn.hardpointName] || { stock: null, current: null, target: null };

          // Get available weapons based on mount type
          let availableWeapons = [];
          let componentTypeToMatch = null;

          if (wpn.mount_type === 'Turret') {
            // For turrets: show available WeaponGun components matching stock gun size
            componentTypeToMatch = 'WeaponGun';
            if (wpn.stock_weapon) {
              availableWeapons = allComponents.filter(c =>
                c.type === 'WeaponGun' && c.size === wpn.stock_weapon.size
              ).sort((a, b) => a.name.localeCompare(b.name));
            }
          } else if (wpn.mount_type === 'MissileLauncher') {
            // For missiles: show available MissileLauncher components matching rack size
            componentTypeToMatch = 'MissileLauncher';
            if (wpn.stock_weapon) {
              availableWeapons = allComponents.filter(c =>
                c.type === 'MissileLauncher' && c.size === wpn.stock_weapon.size
              ).sort((a, b) => a.name.localeCompare(b.name));
            }
          }

          const stockValue = wpn.stock_weapon ? `component:${wpn.stock_weapon.uuid}` : null;
          const currentOptions = buildTargetOptions(availableWeapons, slotData.current || stockValue, wpn.hardpointName);
          const targetOptions = buildTargetOptions(availableWeapons, slotData.target, wpn.hardpointName);

          // For turrets, show the weapon size; for missiles, just show mount name
          let mountDisplay = `${wpn.mount_name}`;
          if (wpn.mount_type === 'Turret' && wpn.stock_weapon) {
            mountDisplay = `${wpn.mount_name} (Size ${wpn.stock_weapon.size})`;
          }

          html += `
            <div class="hardpoint-row">
              <div class="hp-col-component">${formatWeaponMountName(wpn.hardpointName, wpn.mount_sub_type)}</div>
              <div class="hp-col-stock">${mountDisplay}</div>
              <div class="hp-col-current">
                <select class="hp-dropdown" onchange="saveLoadoutSlot('${wpn.hardpointName}', 'current', this.value)">
                  ${currentOptions}
                </select>
              </div>
              <div class="hp-col-target">
                <select class="hp-dropdown" onchange="saveLoadoutSlot('${wpn.hardpointName}', 'target', this.value)">
                  ${targetOptions}
                </select>
              </div>
            </div>
          `;
        });
      }

      document.getElementById('weaponHardpointsContainer').innerHTML = html;
    }

    // Switch between tabs
    function switchTab(tabName) {
      // Hide all tabs
      document.getElementById('systemTab').classList.remove('active');
      document.getElementById('weaponsTab').classList.remove('active');

      // Remove active class from all tab buttons
      document.querySelectorAll('.tab-button').forEach(btn => {
        btn.classList.remove('active');
      });

      // Show selected tab
      if (tabName === 'system') {
        document.getElementById('systemTab').classList.add('active');
        document.querySelectorAll('.tab-button')[0].classList.add('active');
      } else if (tabName === 'weapons') {
        document.getElementById('weaponsTab').classList.add('active');
        document.querySelectorAll('.tab-button')[1].classList.add('active');
        loadWeaponLoadout();
      }

      // Save tab preference
      localStorage.setItem('shipcomp-loadouts-activeTab', tabName);
    }

    // Debug: Query Wiki API directly for component availability
    window.debugComponentAvailability = async function(type) {
      console.log(`\n=== Querying Wiki API for ${type} ===`);
      const components = await WikiAPI.getComponentsByType(type);

      // Group by size
      const bySize = {};
      components.forEach(c => {
        if (!bySize[c.size]) bySize[c.size] = [];
        bySize[c.size].push(c);
      });

      // Log each size group
      for (const size in bySize) {
        const sizeComponents = bySize[size];
        console.log(`\n${type} Size ${size}: ${sizeComponents.length} components`);
        sizeComponents.forEach(c => {
          console.log(`  - ${c.name} (${c.class} ${c.grade})`);
        });
      }
    };

    // Debug helper - run from console: debugAllComponentTypes()
    window.debugAllComponentTypes = async function() {
      const types = ['PowerPlant', 'Shield', 'Radar', 'QuantumDrive', 'Cooler'];
      for (const type of types) {
        await window.debugComponentAvailability(type);
      }
    };

    console.log('Debug functions ready. Run: debugAllComponentTypes()');

    // Go back to hangar
    function goBackToHangar() {
      localStorage.removeItem('shipcomp-loadouts-shipId');
      window.parent.postMessage({
        type: 'shipcomp-navigate',
        src: 'shipcomp_hangar.html'
      }, '*');
    }
  </script>
</body>
</html>
